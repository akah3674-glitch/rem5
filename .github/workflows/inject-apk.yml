name: Inject Bridge vào Game APK

on:
  workflow_dispatch:
    inputs:
      ws_url:
        description: 'WebSocket URL (wss://...app.github.dev hoặc wss://...replit.dev/ws)'
        required: true
        default: 'wss://CODESPACE-8080.app.github.dev'

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ── Cài apktool ───────────────────────────────────────
      - name: Cài apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
          echo '#!/bin/bash' > /usr/local/bin/apktool
          echo 'exec java -jar /usr/local/bin/apktool.jar "$@"' >> /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      # ── Cài baksmali (smali decompiler) ───────────────────
      - name: Cài baksmali + smali
        run: |
          wget -q https://github.com/JesusFreke/smali/releases/download/v2.5.2/baksmali-2.5.2.jar -O /usr/local/bin/baksmali.jar
          wget -q https://github.com/JesusFreke/smali/releases/download/v2.5.2/smali-2.5.2.jar   -O /usr/local/bin/smali.jar
          echo '#!/bin/bash' > /usr/local/bin/baksmali
          echo 'exec java -jar /usr/local/bin/baksmali.jar "$@"' >> /usr/local/bin/baksmali
          chmod +x /usr/local/bin/baksmali

      # ── Cài Android build tools (d8, zipalign, apksigner) ─
      - name: Cài Android SDK build-tools
        run: |
          yes | sdkmanager --install "build-tools;34.0.0" 2>/dev/null | tail -1
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      # ── Decompile game APK ────────────────────────────────
      - name: Decompile client.apk
        run: |
          apktool d client.apk -o /tmp/game_src --no-res -f
          echo "✅ Decompile xong"
          ls /tmp/game_src/

      # ── Compile BridgeService + BridgeProvider → .class ──
      - name: Compile bridge Java sources
        run: |
          mkdir -p /tmp/bridge_classes

          # Android stubs jar (để compile — không bundle vào APK)
          ANDROID_JAR="$ANDROID_HOME/platforms/$(ls $ANDROID_HOME/platforms/ | tail -1)/android.jar"
          if [ ! -f "$ANDROID_JAR" ]; then
            yes | sdkmanager --install "platforms;android-34" 2>/dev/null | tail -1
            ANDROID_JAR="$ANDROID_HOME/platforms/android-34/android.jar"
          fi
          echo "Android jar: $ANDROID_JAR"

          # Patch WS_URL vào source
          sed "s|__WS_URL__|${{ github.event.inputs.ws_url }}|g" \
            android-bridge-inject/src/BridgeService.java > /tmp/BridgeService.java

          cp android-bridge-inject/src/BridgeProvider.java /tmp/BridgeProvider.java

          # Compile
          javac -source 8 -target 8 \
            -cp "$ANDROID_JAR" \
            -d /tmp/bridge_classes \
            /tmp/BridgeService.java /tmp/BridgeProvider.java
          echo "✅ Compile OK"
          ls /tmp/bridge_classes/com/nro/bridge/

      # ── Convert .class → .dex → .smali ───────────────────
      - name: Convert Java → DEX → smali
        run: |
          # class → dex
          d8 /tmp/bridge_classes/com/nro/bridge/*.class \
            --output /tmp/bridge.dex \
            --min-api 26

          # dex → smali
          java -jar /usr/local/bin/baksmali.jar d /tmp/bridge.dex \
            -o /tmp/bridge_smali
          echo "✅ Smali files:"
          ls /tmp/bridge_smali/com/nro/bridge/

      # ── Inject smali vào game source ─────────────────────
      - name: Inject smali vào decompiled APK
        run: |
          mkdir -p /tmp/game_src/smali/com/nro/bridge
          cp /tmp/bridge_smali/com/nro/bridge/*.smali \
             /tmp/game_src/smali/com/nro/bridge/
          echo "✅ Smali injected:"
          ls /tmp/game_src/smali/com/nro/bridge/

      # ── Patch AndroidManifest.xml ─────────────────────────
      - name: Patch AndroidManifest.xml
        run: |
          python3 android-bridge-inject/patch_manifest.py \
            /tmp/game_src/AndroidManifest.xml
          grep -A3 "nro.bridge" /tmp/game_src/AndroidManifest.xml

      # ── Rebuild APK ───────────────────────────────────────
      - name: Rebuild APK với apktool
        run: |
          apktool b /tmp/game_src \
            -o /tmp/NROGame-unsigned.apk \
            --use-aapt2
          echo "✅ APK rebuilt: $(du -sh /tmp/NROGame-unsigned.apk | cut -f1)"

      # ── Sign APK ─────────────────────────────────────────
      - name: Tạo keystore + Sign APK
        run: |
          # Tạo debug keystore
          keytool -genkeypair -v \
            -keystore /tmp/nro.keystore \
            -alias nro \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass nropass \
            -keypass nropass \
            -dname "CN=NRO,O=NRO,C=VN" 2>/dev/null

          # Zipalign
          zipalign -v 4 \
            /tmp/NROGame-unsigned.apk \
            /tmp/NROGame-aligned.apk

          # Sign
          apksigner sign \
            --ks /tmp/nro.keystore \
            --ks-key-alias nro \
            --ks-pass pass:nropass \
            --key-pass pass:nropass \
            --out /tmp/NROGame-bridge.apk \
            /tmp/NROGame-aligned.apk

          # Verify
          apksigner verify /tmp/NROGame-bridge.apk
          echo "✅ APK signed OK"
          echo "📦 Size: $(du -sh /tmp/NROGame-bridge.apk | cut -f1)"

      # ── Upload APK artifact ───────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NROGame-with-bridge
          path: /tmp/NROGame-bridge.apk
          retention-days: 30

      - name: Tóm tắt
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  ✅ APK BUILD THÀNH CÔNG                        ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  📥 Download: Actions → Artifacts               ║"
          echo "║              → NROGame-with-bridge              ║"
          echo "║                                                  ║"
          echo "║  📱 Cài APK lên điện thoại                      ║"
          echo "║  🎮 Mở game → Custom Server                     ║"
          echo "║     IP:   127.0.0.1                             ║"
          echo "║     Port: 14445                                  ║"
          echo "║  ✅ Bridge tự chạy ngầm, không cần app thêm    ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "WS_URL đã nhúng: ${{ github.event.inputs.ws_url }}"
